<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ФК — САВДО АНАЛИТИКАСИ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d1117;
    --bg2: #131b26;
    --bg3: #1a2535;
    --border: #1e3050;
    --accent: #4f9cf9;
    --accent2: #2ecb8e;
    --accent3: #f0a843;
    --accent4: #e8607a;
    --text: #e2e8f0;
    --text2: #8899aa;
    --header-h: 56px;
  }

  body.light {
    --bg: #f0f4f8;
    --bg2: #ffffff;
    --bg3: #e8edf3;
    --border: #d0dae8;
    --text: #1a2535;
    --text2: #5a6a7e;
  }

  body.light header h1 { color: #1a2535; }
  body.light .logo-box { background: var(--accent); }
  body.light table td, body.light table th { color: var(--text2); }
  body.light table td:first-child { color: var(--text); }
  body.light .bold-row td { color: var(--text) !important; }
  body.light .total-col { color: var(--accent) !important; }
  body.light .filter-bar { background: var(--bg2); border-bottom-color: var(--border); }
  body.light .pill { color: var(--text2); border-color: var(--border); background: var(--bg3); }
  body.light .pill.active { background: var(--accent); color:#fff; border-color: var(--accent); }
  body.light .brand-pill { color: var(--text2); border-color: var(--border); background: var(--bg3); }
  body.light .brand-pill.active { color: var(--accent); border-color: var(--accent); background: rgba(79,156,249,.12); }
  body.light .card { background: var(--bg2); border-color: var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  body.light .kpi-card { background: var(--bg2); border-color: var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  body.light .card-title { color: var(--text2); }
  body.light .filter-label { color: var(--text2); }
  body.light .tab-btn { color: var(--text2); }
  body.light .tab-btn:hover:not(.active) { background: var(--bg3); color: var(--text); }
  body.light table { background: var(--bg2); }
  body.light th { background: var(--bg3); border-bottom-color: var(--border); }
  body.light tr:hover td { background: rgba(79,156,249,.06); }
  body.light .kpi-label { color: var(--text2); }
  body.light .kpi-sub { color: var(--text2); }

  /* Dark mode toggle */
  .theme-btn {
    width:36px; height:20px; border-radius:10px; border:none; cursor:pointer;
    position:relative; flex-shrink:0; transition:background .2s;
    background: var(--bg3);
    border: 1px solid var(--border);
  }
  .theme-btn::after {
    content:''; position:absolute; top:2px; left:2px;
    width:14px; height:14px; border-radius:50%;
    background: var(--accent); transition:transform .2s;
  }
  body.light .theme-btn::after { transform:translateX(16px); }
  .theme-label { font-size:11px; color:var(--text2); white-space:nowrap; }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background .25s, color .25s;
  }

  /* ── Header ── */
  header {
    height: var(--header-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    position: sticky; top:0; z-index:100;
  }
  .logo-box {
    width:34px; height:34px; border-radius:8px;
    background: var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:16px; color:#fff;
    flex-shrink:0;
  }
  header h1 {
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:18px;
    letter-spacing:1px; color:#fff; flex:1;
  }
  .tab-group {
    display:flex; gap:4px;
  }
  .tab-btn {
    padding:6px 16px; border-radius:6px; border:none; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
    background:transparent; color:var(--text2); transition:all .2s;
  }
  .tab-btn.active { background:var(--accent); color:#fff; }
  .tab-btn:hover:not(.active) { background: var(--bg3); color:var(--text); }

  /* ── Filter Bar ── */
  .filter-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 48px;
  }
  .filter-label { font-size:12px; color:var(--text2); font-weight:500; }
  .pill-group { display:flex; gap:4px; flex-wrap:wrap; }
  .pill {
    padding:4px 12px; border-radius:20px; border:1px solid var(--border);
    font-size:12px; cursor:pointer; transition:all .15s; color:var(--text2);
    background: transparent; font-family:'Inter',sans-serif;
  }
  .pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .pill:hover:not(.active) { border-color: var(--accent); color:var(--accent); }

  /* ── Brand pills ── */
  .brand-pill {
    padding:4px 10px; border-radius:20px; border:1px solid var(--border);
    font-size:11px; cursor:pointer; transition:all .15s; color:var(--text2);
    background: transparent; font-family:'Inter',sans-serif; white-space:nowrap;
  }
  .brand-pill.active { border-color:var(--accent); color:var(--accent); background: rgba(79,156,249,.1); }

  /* ── Main layout ── */
  .page { display:none; padding:16px 20px; }
  .page.active { display:block; }

  /* ── KPI Cards ── */
  .kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px; }
  .kpi-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:12px;
    padding:14px 18px; position:relative; overflow:hidden;
  }
  .kpi-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: var(--accent);
  }
  .kpi-card:nth-child(2)::before { background:var(--accent3); }
  .kpi-card:nth-child(3)::before { background:var(--accent2); }
  /* Prit KPI cards use inline border-top color, hide ::before */
  #pritKpiRow .kpi-card::before { display:none; }
  #pritKpiRow .kpi-card { border-top-width:2px; }
  .kpi-label { font-size:11px; color:var(--text2); font-weight:500; margin-bottom:6px; }
  .kpi-value {
    font-family:'Rajdhani',sans-serif; font-size:36px; font-weight:700;
    color:var(--accent); line-height:1;
  }
  .kpi-card:nth-child(2) .kpi-value { color:var(--accent3); }
  .kpi-card:nth-child(3) .kpi-value { color:var(--accent2); }
  .kpi-sub { font-size:11px; color:var(--text2); margin-top:4px; }

  /* ── Grid layouts ── */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  .grid-half { display:grid; grid-template-columns:45% 55%; gap:14px; margin-bottom:14px; }

  /* ── Chart Cards ── */
  .card {
    background:var(--bg2); border:1px solid var(--border); border-radius:12px;
    padding:16px; overflow:hidden;
  }
  .card-title {
    font-size:12px; font-weight:600; color:var(--text2); margin-bottom:12px;
    text-transform:uppercase; letter-spacing:.5px;
    display:flex; align-items:center; gap:6px;
  }
  .card-title span { color:var(--accent); }
  canvas { max-height:220px; }

  /* ── Table ── */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th {
    background:var(--bg3); color:var(--text2); font-weight:600;
    padding:8px 10px; text-align:right; border-bottom:1px solid var(--border);
    font-size:11px;
  }
  th:first-child { text-align:left; }
  td {
    padding:7px 10px; text-align:right; border-bottom:1px solid rgba(30,48,80,.5);
    color:var(--text); font-size:12px;
  }
  td:first-child { text-align:left; color:var(--text2); font-weight:500; }
  tr:hover td { background:rgba(79,156,249,.04); }
  .bold-row td { font-weight:700; color:#fff; }
  .total-col { font-weight:700; color:var(--accent) !important; }

  /* ── Pritsep tab specifics ── */
  .prit-kpi { grid-template-columns: repeat(4, 1fr); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* Full-width chart */
  .full-card { margin-bottom:14px; }
  .full-card canvas { max-height:260px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-box">ФК</div>
  <h1>ФК — САВДО АНАЛИТИКАСИ</h1>
  <div class="tab-group">
    <button class="tab-btn active" onclick="switchTab('gruz')">🚛 Грузовые автомобили</button>
    <button class="tab-btn" onclick="switchTab('prit')">🔗 Прицепная техника</button>
  </div>
  <span class="theme-label" id="themeLabel">🌙</span>
  <button class="theme-btn" onclick="toggleTheme()" title="Тема алмаштириш"></button>
</header>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar">
  <span class="filter-label">Йил:</span>
  <div class="pill-group" id="yearPills"></div>
  <span class="filter-label" id="brandLabel">Бренд:</span>
  <div class="pill-group" id="brandPills"></div>
</div>

<!-- ГРУЗОВЫЕ PAGE -->
<div class="page active" id="page-gruz">
  <!-- KPI -->
  <div class="kpi-row" id="gruzKpiRow" style="grid-template-columns:repeat(5,1fr);"></div>

  <!-- Row 1: Donut + Table -->
  <div class="grid-half">
    <div class="card">
      <div class="card-title"><span>●</span> Брендлар улуши</div>
      <canvas id="donutChart"></canvas>
    </div>
    <div class="card">
      <div class="card-title"><span>▦</span> Брендлар жадвали — Йил бўйича тафсилот</div>
      <div class="table-wrap">
        <table id="brandTable"></table>
      </div>
    </div>
  </div>

  <!-- Row 2: Bar + Line -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title"><span>▬</span> Кузов тури бўйича</div>
      <canvas id="kuzovBar"></canvas>
    </div>
    <div class="card">
      <div class="card-title"><span>〜</span> Ойлик сотув тренди</div>
      <canvas id="trendLine"></canvas>
    </div>
  </div>
</div>

<!-- ПРИЦЕПНАЯ PAGE -->
<div class="page" id="page-prit">
  <!-- KPI -->
  <div class="kpi-row prit-kpi" id="pritKpiRow" style="grid-template-columns:repeat(5,1fr);">
  </div>

  <!-- Row 1: Donut + Bar -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title"><span>●</span> Прицеп турлари улуши</div>
      <canvas id="pritDonut"></canvas>
    </div>
    <div class="card">
      <div class="card-title"><span>▬</span> Турлар бўйича жами</div>
      <canvas id="pritBar"></canvas>
    </div>
  </div>

  <!-- Row 2: Line -->
  <div class="card full-card">
    <div class="card-title"><span>〜</span> Ойлик тренд — Прицеп</div>
    <canvas id="pritLine"></canvas>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="card-title"><span>▦</span> Прицеп жадвали</div>
    <div class="table-wrap">
      <table id="pritTable"></table>
    </div>
  </div>
</div>

function getActiveYears(){
  const allYears = curTab==='gruz' ? DATA.years_gruz : DATA.years_prit;
  return selectedYears === null ? allYears : [selectedYears];
}

function buildPills(){
  const yearPills = document.getElementById('yearPills');
  const brandPills = document.getElementById('brandPills');
  const brandLabel = document.getElementById('brandLabel');

  yearPills.innerHTML = '';
  brandPills.innerHTML = '';

  const years = curTab === 'gruz' ? DATA.years_gruz : DATA.years_prit;

  // "Барча" pill
  const allBtn = document.createElement('button');
  allBtn.className = 'pill' + (selectedYears===null ? ' active' : '');
  allBtn.textContent = 'Барча';
  allBtn.onclick = ()=>{ selectedYears=null; buildPills(); if(curTab==='gruz') renderGruz(); else renderPrit(); };
  yearPills.appendChild(allBtn);

  years.forEach(yr=>{
    const b = document.createElement('button');
    b.className = 'pill' + (selectedYears===yr ? ' active' : '');
    b.textContent = yr;
    b.onclick = ()=>{ selectedYears=yr; buildPills(); if(curTab==='gruz') renderGruz(); else renderPrit(); };
    yearPills.appendChild(b);
  });

  if(curTab === 'gruz'){
    brandLabel.style.display = '';
    brandPills.style.display = '';
    const all = document.createElement('button');
    all.className = 'brand-pill' + (!selectedBrand ? ' active' : '');
    all.textContent = 'Барча';
    all.onclick = ()=>{ selectedBrand=null; renderGruz(); buildPills(); };
    brandPills.appendChild(all);

    DATA.brands.slice(0,-1).forEach(br=>{
      const b = document.createElement('button');
      b.className = 'brand-pill' + (selectedBrand===br ? ' active' : '');
      b.textContent = br;
      b.onclick = ()=>{ selectedBrand=br; renderGruz(); buildPills(); };
      brandPills.appendChild(b);
    });
  } else {
    brandLabel.style.display = 'none';
    brandPills.style.display = 'none';
  }
}

function switchTab(tab){
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', (i===0&&tab==='gruz')||(i===1&&tab==='prit')));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  // Reset year selection for the new tab
  selectedYears = null;
  buildPills();
  if(tab==='gruz') renderGruz(); else renderPrit();
}

  const brand = selectedBrand;
  const years = getActiveYears();

  // Aggregate monthly totals for "Итого Рынок" or selected brand
  const mainKey = brand || 'Итого Рынок';
  let monthly = Array(12).fill(0);
  years.forEach(yr=>{
    const d = DATA.gruz[String(yr)];
    if(d && d[mainKey]) d[mainKey].forEach((v,i)=>monthly[i]+=v);
  });

  const total = sum(monthly);
  const nonZero = monthly.filter(v=>v>0).length || 1;
  const avg = Math.round(total / nonZero);

  // ── Growth % vs prev year ──
  const allGruzYears = DATA.years_gruz;
  const sortedSel = [...years].sort();
  let gruzGrowth = null, gruzGrowthSub = '';
  if(sortedSel.length >= 2){
    const yp = sortedSel[sortedSel.length-2], yc = sortedSel[sortedSel.length-1];
    const prev = DATA.gruz[String(yp)]?.[mainKey] ? sum(DATA.gruz[String(yp)][mainKey]) : 0;
    const curr = DATA.gruz[String(yc)]?.[mainKey] ? sum(DATA.gruz[String(yc)][mainKey]) : 0;
    if(prev>0){ gruzGrowth = ((curr-prev)/prev*100).toFixed(1); gruzGrowthSub=`${yp}→${yc}`; }
  } else if(sortedSel.length===1){
    const idx = allGruzYears.indexOf(sortedSel[0]);
    if(idx>0){
      const yp=allGruzYears[idx-1], yc=sortedSel[0];
      const prev = DATA.gruz[String(yp)]?.[mainKey] ? sum(DATA.gruz[String(yp)][mainKey]) : 0;
      const curr = DATA.gruz[String(yc)]?.[mainKey] ? sum(DATA.gruz[String(yc)][mainKey]) : 0;
      if(prev>0){ gruzGrowth = ((curr-prev)/prev*100).toFixed(1); gruzGrowthSub=`${yp}→${yc}`; }
    }
  }

  // ── Top brand ──
  const brsForTop = DATA.brands.slice(0,-1);
  const brandTotals = brsForTop.map(br=>sumAllYears(br,years));
  const topBrandIdx = brandTotals.indexOf(Math.max(...brandTotals));
  const topBrand = brsForTop[topBrandIdx];
  const topBrandShort = topBrand.length>14 ? topBrand.slice(0,14)+'…' : topBrand;

  // ── Import share % ──
  const importTotal = sumAllYears('Импорт', years);
  const importPct = total > 0 ? (importTotal/total*100).toFixed(1) : '0';

  // ── Peak month ──
  const peakVal = Math.max(...monthly);
  const peakMon = MONTHS[monthly.indexOf(peakVal)];

  // ── Last year total ──
  const lastSelYr = sortedSel[sortedSel.length-1];
  const lastYrData = DATA.gruz[String(lastSelYr)]?.[mainKey] || [];
  const lastYrTotal = sum(lastYrData);

  const gruzKpiCards = [
    { label:'Жами Сотув',      display: total>=1000?(total/1000).toFixed(1)+'K':total,   sub: brand||'Итого Рынок',                       color:'#4f9cf9' },
    { label:'Йиллик ўсиш',     display: gruzGrowth!==null?(gruzGrowth>0?'+':'')+gruzGrowth+'%':'—', sub: gruzGrowthSub||'Солиштириш йўқ', color: gruzGrowth!==null?(parseFloat(gruzGrowth)>=0?'#2ecb8e':'#e8607a'):'#8899aa' },
    { label:'Энг кўп бренд',   display: topBrandShort,                                    sub: brandTotals[topBrandIdx]+' дона',           color:'#f0a843', small:true },
    { label:'Импорт улуши',    display: importPct+'%',                                    sub: importTotal+' дона импорт',                 color:'#e8607a' },
    { label:'Пик ой',          display: peakMon.toUpperCase(),                            sub: peakVal+' — рекорд ой',                     color:'#a78bfa', small:true },
  ];

  const gruzKpiRow = document.getElementById('gruzKpiRow');
  gruzKpiRow.innerHTML = '';
  gruzKpiCards.forEach((k,i)=>{
    const card = document.createElement('div');
    card.className = 'kpi-card';
    card.style.cssText = `border-top:2px solid ${k.color};`;
    const fs = k.small ? '20px' : (String(k.display).length>6?'24px':'32px');
    card.innerHTML = `<div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.color};font-size:${fs};line-height:1.2;">${k.display}</div>
      <div class="kpi-sub">${k.sub}</div>`;
    gruzKpiRow.appendChild(card);
  });

  // ── Donut: brand shares ──
  const brandsForDonut = DATA.brands.slice(0,-1); // exclude Итого Рынок
  const donutVals = brandsForDonut.map(br=>sumAllYears(br,years));
  const donutTotal = sum(donutVals);

  destroyChart('donutChart');
  // Center total plugin
  const centerTextPlugin = {
    id:'centerText',
    afterDraw(chart){
      const {ctx, chartArea:{width,height,left,top}} = chart;
      const cx = left + width/2, cy = top + height/2;
      ctx.save();
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font='bold 22px Rajdhani, sans-serif';
      ctx.fillStyle= document.body.classList.contains('light') ? '#1a2535' : '#e2e8f0';
      ctx.fillText(donutTotal>=1000?(donutTotal/1000).toFixed(1)+'K':donutTotal, cx, cy-8);
      ctx.font='11px Inter, sans-serif';
      ctx.fillStyle= document.body.classList.contains('light') ? '#5a6a7e' : '#8899aa';
      ctx.fillText('Жами', cx, cy+12);
      ctx.restore();
    }
  };
  charts['donutChart'] = new Chart(document.getElementById('donutChart').getContext('2d'),{
    type:'doughnut',
    data:{
      labels: brandsForDonut.map((br,i)=>`${br} (${donutTotal>0?(donutVals[i]/donutTotal*100).toFixed(1):'0'}%)`),
      datasets:[{data:donutVals, backgroundColor:BRAND_COLORS, borderWidth:1, borderColor:getBorderColor()}]
    },
    options:{
      responsive:true, maintainAspectRatio:true, cutout:'62%',
      plugins:{
        legend:{position:'right', labels:{color:getTextColor(),font:{size:10},boxWidth:10,padding:8}},
        tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+ctx.parsed}}
      }
    },
    plugins:[centerTextPlugin]
  });

  // ── Brand table: kuzov_turi by year ──
  buildBrandTable(brand, years);

  // ── Kuzov bar ──
  buildKuzovBar(brand, years);

  // ── Trend line ──
  buildTrendLine(brand, years);
}

function buildBrandTable(brand, years){
  const tbl = document.getElementById('brandTable');
  // Show kuzov breakdown for selected brand, or all brands if none selected
  if(brand){
    const kd = DATA.kuzov_data[brand];
    if(!kd){ tbl.innerHTML=''; return; }
    const kuzovs = kd._kuzovs;
    let html = '<thead><tr><th>Kuzov_Turi</th>';
    years.forEach(yr=>html+=`<th>${yr}</th>`);
    html+=`<th class="total-col">Жами</th></tr></thead><tbody>`;
    kuzovs.forEach(kz=>{
      let rowTotal=0;
      html+=`<tr><td>${kz}</td>`;
      years.forEach(yr=>{
        const v = kd[String(yr)] && kd[String(yr)][kz] ? sum(kd[String(yr)][kz]) : 0;
        rowTotal+=v;
        html+=`<td>${v||''}</td>`;
      });
      html+=`<td class="total-col"><b>${rowTotal}</b></td></tr>`;
    });
    // Total row
    html+=`<tr class="bold-row"><td>Жами</td>`;
    let grandTotal=0;
    years.forEach(yr=>{
      let ySum=0;
      kuzovs.forEach(kz=>{ ySum += kd[String(yr)]&&kd[String(yr)][kz]?sum(kd[String(yr)][kz]):0; });
      grandTotal+=ySum;
      html+=`<td>${ySum}</td>`;
    });
    html+=`<td class="total-col">${grandTotal}</td></tr></tbody>`;
    tbl.innerHTML=html;
  } else {
    // All brands table
    const brs = DATA.brands.slice(0,-1);
    let html='<thead><tr><th>Бренд</th>';
    years.forEach(yr=>html+=`<th>${yr}</th>`);
    html+=`<th class="total-col">Жами</th></tr></thead><tbody>`;
    brs.forEach(br=>{
      let rowTotal=0;
      html+=`<tr><td>${br}</td>`;
      years.forEach(yr=>{
        let v = DATA.gruz[String(yr)]&&DATA.gruz[String(yr)][br]?sum(DATA.gruz[String(yr)][br]):0;
        // Manual correction: VUM 2023 = 312
        if(br==='VUM (FAW,импорт+Tiger 10-11 т)' && yr===2023) v=312;
        rowTotal+=v;
        html+=`<td>${v||''}</td>`;
      });
      html+=`<td class="total-col"><b>${rowTotal}</b></td></tr>`;
    });
    // Итого
    html+=`<tr class="bold-row"><td>Итого</td>`;
    let grand=0;
    years.forEach(yr=>{
      let v = DATA.gruz[String(yr)]&&DATA.gruz[String(yr)]['Итого Рынок']?sum(DATA.gruz[String(yr)]['Итого Рынок']):0;
      // Add VUM correction to total
      if(yr===2023) v+=312;
      grand+=v;
      html+=`<td>${v}</td>`;
    });
    html+=`<td class="total-col">${grand}</td></tr></tbody>`;
    tbl.innerHTML=html;
  }
}

function buildKuzovBar(brand, years){
  // If a brand is selected, show its kuzov breakdown
  // Otherwise aggregate all brands kuzovs
  destroyChart('kuzovBar');
  let kuzovTotals = {};
  const brs = brand ? [brand] : DATA.brands.slice(0,-1);
  brs.forEach(br=>{
    const kd = DATA.kuzov_data[br];
    if(!kd) return;
    kd._kuzovs.forEach(kz=>{
      if(!kuzovTotals[kz]) kuzovTotals[kz]=0;
      years.forEach(yr=>{
        if(kd[String(yr)]&&kd[String(yr)][kz]) kuzovTotals[kz]+=sum(kd[String(yr)][kz]);
      });
    });
  });
  const labels = Object.keys(kuzovTotals).sort((a,b)=>kuzovTotals[b]-kuzovTotals[a]);
  const vals = labels.map(k=>kuzovTotals[k]);
  const colors = labels.map(k=>KUZOV_COLORS[k]||'#4f9cf9');

  charts['kuzovBar'] = new Chart(document.getElementById('kuzovBar').getContext('2d'),{
    type:'bar',
    data:{labels, datasets:[{data:vals, backgroundColor:colors, borderRadius:4}]},
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:true,
      layout:{padding:{right:50}},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>' '+c.parsed.x}},
        datalabels:{
          display:true,
          anchor:'end', align:'end', clamp:true,
          color:'#e2e8f0', font:{size:11, weight:'600'},
          formatter: v => v > 0 ? v.toLocaleString() : ''
        }
      },
      scales:{
        x:{ticks:{color:getTextColor(),font:{size:10}}, grid:{color:getGridColor()}},
        y:{ticks:{color:getTextColor(), font:{size:10}}, grid:{display:false}}
      }
    }
  });
}

function buildTrendLine(brand, years){
  destroyChart('trendLine');
  // Build datasets per year
  const key = brand || 'Итого Рынок';
  const datasets = years.map((yr,i)=>({
    label: String(yr),
    data: DATA.gruz[String(yr)] && DATA.gruz[String(yr)][key] ? DATA.gruz[String(yr)][key] : Array(12).fill(0),
    borderColor: BRAND_COLORS[i % BRAND_COLORS.length],
    backgroundColor: 'transparent',
    tension: 0.4, pointRadius:3, borderWidth:2
  }));

  charts['trendLine'] = new Chart(document.getElementById('trendLine').getContext('2d'),{
    type:'line',
    data:{labels:MONTHS, datasets},
    options:{
      responsive:true, maintainAspectRatio:true,
      layout:{padding:{top:20}},
      plugins:{
        legend:{labels:{color:getTextColor(),font:{size:10},boxWidth:10}},
        datalabels:{
          display:true,
          align:'top', anchor:'end',
          color: ctx => datasets[ctx.datasetIndex].borderColor,
          font:{size:9, weight:'600'},
          formatter: v => v > 0 ? v : '',
          offset:2
        }
      },
      scales:{
        x:{ticks:{color:getTextColor(),font:{size:10}}, grid:{color:getGridColor()}},
        y:{ticks:{color:getTextColor(),font:{size:10}}, grid:{color:getGridColor()}}
      }
    }
  });
}

function renderPrit(){
  const years = getActiveYears();
  const types = DATA.prit_types;

  // KPI cards - top 4 types
  const typeTotals = {};
  types.forEach(pt=>{
    typeTotals[pt] = years.reduce((t,yr)=>t+(DATA.prit[String(yr)]&&DATA.prit[String(yr)][pt]?sum(DATA.prit[String(yr)][pt]):0),0);
  });
  const sorted = types.slice().sort((a,b)=>typeTotals[b]-typeTotals[a]);

  // ── 5 KPI cards ──
  const allYearsPrit = DATA.years_prit; // [2024,2025,2026]

  // 1. Жами прицеп сони (selected years)
  const totalPrit = sum(Object.values(typeTotals));

  // 2. Йиллик ўсиш % — compare last two years in selection
  let growthPct = null;
  const sortedSelYears = [...years].sort();
  if(sortedSelYears.length >= 2){
    const yPrev = sortedSelYears[sortedSelYears.length-2];
    const yCurr = sortedSelYears[sortedSelYears.length-1];
    const prevSum = types.reduce((t,pt)=>t+(DATA.prit[String(yPrev)]&&DATA.prit[String(yPrev)][pt]?sum(DATA.prit[String(yPrev)][pt]):0),0);
    const currSum = types.reduce((t,pt)=>t+(DATA.prit[String(yCurr)]&&DATA.prit[String(yCurr)][pt]?sum(DATA.prit[String(yCurr)][pt]):0),0);
    growthPct = prevSum > 0 ? ((currSum - prevSum)/prevSum*100).toFixed(1) : null;
  } else {
    // single year selected — compare with previous year if available
    const yr = sortedSelYears[0];
    const yrIdx = allYearsPrit.indexOf(yr);
    if(yrIdx > 0){
      const yPrev = allYearsPrit[yrIdx-1];
      const prevSum = types.reduce((t,pt)=>t+(DATA.prit[String(yPrev)]&&DATA.prit[String(yPrev)][pt]?sum(DATA.prit[String(yPrev)][pt]):0),0);
      const currSum = types.reduce((t,pt)=>t+(DATA.prit[String(yr)]&&DATA.prit[String(yr)][pt]?sum(DATA.prit[String(yr)][pt]):0),0);
      growthPct = prevSum > 0 ? ((currSum - prevSum)/prevSum*100).toFixed(1) : null;
    }
  }

  // 3. Энг кўп сотилган тур
  const topType = sorted[0];
  const shortNames = {
    'Релизация UAT на внутр. рынок':'UAT',
    'Самосвальные п/п (в т.ч. зерновоз)':'Самосвал п/п',
    'Тракторный прицеп':'Трактор пр.',
    'Шторные п/п':'Шторные',
    'Бортовой полуприцеп контейнеровоз':'Борт конт.',
    'Полуприцеп контейнеровоз':'Конт.',
    'Низкорамный трал':'Трал',
    'Самосвальный прицеп':'Сам. пр.',
    'Прицеп цистерна для питьевой воды':'Цистерна',
    'Полуприцеп коневоз':'Коневоз',
    'Полуприцеп зерновоз':'Зерновоз',
  };

  // 4. Ўртача ойлик
  const nonZeroMonths = (() => {
    let monthly = Array(12).fill(0);
    years.forEach(yr=>{
      types.forEach(pt=>{
        const d = DATA.prit[String(yr)];
        if(d&&d[pt]) d[pt].forEach((v,i)=>monthly[i]+=v);
      });
    });
    return monthly.filter(v=>v>0).length || 1;
  })();
  const avgMonthly = Math.round(totalPrit / nonZeroMonths);

  // 5. Сўнгги йил жами (most recent year in selection)
  const lastYr = sortedSelYears[sortedSelYears.length-1];
  const lastYrTotal = types.reduce((t,pt)=>t+(DATA.prit[String(lastYr)]&&DATA.prit[String(lastYr)][pt]?sum(DATA.prit[String(lastYr)][pt]):0),0);

  const kpiCards = [
    {
      label:'Жами прицеп',
      value: totalPrit,
      display: totalPrit,
      sub:'Умумий дона',
      color:'#4f9cf9'
    },
    {
      label:'Йиллик ўсиш',
      value: growthPct !== null ? growthPct+'%' : '—',
      display: growthPct !== null ? (growthPct > 0 ? '+'+growthPct+'%' : growthPct+'%') : '—',
      sub: sortedSelYears.length>=2 ? `${sortedSelYears[sortedSelYears.length-2]}→${sortedSelYears[sortedSelYears.length-1]}` : (sortedSelYears.length===1&&allYearsPrit.indexOf(sortedSelYears[0])>0 ? `${allYearsPrit[allYearsPrit.indexOf(sortedSelYears[0])-1]}→${sortedSelYears[0]}` : 'Солиштириш йўқ'),
      color: growthPct !== null ? (parseFloat(growthPct) >= 0 ? '#2ecb8e' : '#e8607a') : '#8899aa'
    },
    {
      label:'Энг кўп сотилган',
      value: shortNames[topType]||topType,
      display: shortNames[topType]||topType,
      sub: typeTotals[topType]+' дона',
      color:'#f0a843',
      small: true
    },
    {
      label:'Ўртача / Ой',
      value: avgMonthly,
      display: avgMonthly,
      sub:'Ойлик ўртача',
      color:'#e8607a'
    },
    {
      label:`${lastYr} йил жами`,
      value: lastYrTotal,
      display: lastYrTotal,
      sub:'Сўнгги йил',
      color:'#a78bfa'
    },
  ];

  const kpiRow = document.getElementById('pritKpiRow');
  kpiRow.innerHTML = '';
  kpiRow.style.gridTemplateColumns = 'repeat(5,1fr)';
  kpiCards.forEach(k=>{
    const card = document.createElement('div');
    card.className = 'kpi-card';
    const fontSize = k.small ? '18px' : (String(k.display).length > 5 ? '22px' : '32px');
    card.innerHTML = `<div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.color};font-size:${fontSize};line-height:1.2;">${k.display}</div>
      <div class="kpi-sub">${k.sub}</div>`;
    // top accent color via inline style
    card.style.borderTop = `2px solid ${k.color}`;
    kpiRow.appendChild(card);
  });

  // Donut
  const donutVals = types.map(pt=>typeTotals[pt]);
  const donutLabels = ['UAT','Самосвал','Шторные','Трал','Борт конт.','Конт.','Сам.пр.','Трактор','Цистерна','Коневоз','Зерновоз'];
  const pritTotal = sum(donutVals);
  const pritCenterPlugin = {
    id:'pritCenter',
    afterDraw(chart){
      const {ctx, chartArea:{width,height,left,top}} = chart;
      const cx = left+width/2, cy = top+height/2;
      ctx.save();
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font='bold 20px Rajdhani, sans-serif';
      ctx.fillStyle= document.body.classList.contains('light') ? '#1a2535' : '#e2e8f0';
      ctx.fillText(pritTotal>=1000?(pritTotal/1000).toFixed(1)+'K':pritTotal, cx, cy-8);
      ctx.font='11px Inter, sans-serif';
      ctx.fillStyle= document.body.classList.contains('light') ? '#5a6a7e' : '#8899aa';
      ctx.fillText('Жами', cx, cy+12);
      ctx.restore();
    }
  };
  destroyChart('pritDonut');
  charts['pritDonut'] = new Chart(document.getElementById('pritDonut').getContext('2d'),{
    type:'doughnut',
    data:{labels:donutLabels.map((l,i)=>`${l} (${pritTotal>0?(donutVals[i]/pritTotal*100).toFixed(1):'0'}%)`), datasets:[{data:donutVals, backgroundColor:PRIT_COLORS, borderWidth:1, borderColor:getBorderColor()}]},
    options:{
      responsive:true, maintainAspectRatio:true, cutout:'62%',
      plugins:{legend:{position:'right',labels:{color:getTextColor(),font:{size:10},boxWidth:10,padding:6}}}
    },
    plugins:[pritCenterPlugin]
  });

  // Bar
  destroyChart('pritBar');
  charts['pritBar'] = new Chart(document.getElementById('pritBar').getContext('2d'),{
    type:'bar',
    data:{
      labels:donutLabels,
      datasets:[{data:donutVals, backgroundColor:PRIT_COLORS, borderRadius:4}]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:true,
      layout:{padding:{right:50}},
      plugins:{
        legend:{display:false},
        datalabels:{
          display:true,
          anchor:'end', align:'end', clamp:true,
          color:'#e2e8f0', font:{size:11, weight:'600'},
          formatter: v => v > 0 ? v : ''
        }
      },
      scales:{
        x:{ticks:{color:getTextColor(),font:{size:10}}, grid:{color:getGridColor()}},
        y:{ticks:{color:getTextColor(),font:{size:10}}, grid:{display:false}}
      }
    }
  });

  // Line trend - monthly total across all types
  destroyChart('pritLine');
  const lineDatasets = years.map((yr,i)=>{
    const monthly = Array(12).fill(0);
    types.forEach(pt=>{
      const d = DATA.prit[String(yr)];
      if(d&&d[pt]) d[pt].forEach((v,mi)=>monthly[mi]+=v);
    });
    return {label:String(yr), data:monthly, borderColor:PRIT_COLORS[i], backgroundColor:'transparent', tension:0.4, pointRadius:3, borderWidth:2};
  });
  charts['pritLine'] = new Chart(document.getElementById('pritLine').getContext('2d'),{
    type:'line',
    data:{labels:MONTHS, datasets:lineDatasets},
    options:{
      responsive:true, maintainAspectRatio:true,
      layout:{padding:{top:20}},
      plugins:{
        legend:{labels:{color:getTextColor(),font:{size:10},boxWidth:10}},
        datalabels:{
          display:true,
          align:'top', anchor:'end',
          color: ctx => lineDatasets[ctx.datasetIndex].borderColor,
          font:{size:9, weight:'600'},
          formatter: v => v > 0 ? v : '',
          offset:2
        }
      },
      scales:{
        x:{ticks:{color:getTextColor(),font:{size:10}}, grid:{color:getGridColor()}},
        y:{ticks:{color:getTextColor(),font:{size:10}}, grid:{color:getGridColor()}}
      }
    }
  });

  // Table
  const tbl = document.getElementById('pritTable');
  let html='<thead><tr><th>Тур</th>';
  years.forEach(yr=>html+=`<th>${yr}</th>`);
  html+=`<th class="total-col">Жами</th></tr></thead><tbody>`;
  types.forEach((pt,pi)=>{
    let rowTotal=0;
    html+=`<tr><td>${donutLabels[pi]||pt}</td>`;
    years.forEach(yr=>{
      const v = DATA.prit[String(yr)]&&DATA.prit[String(yr)][pt]?sum(DATA.prit[String(yr)][pt]):0;
      rowTotal+=v;
      html+=`<td>${v||''}</td>`;
    });
    html+=`<td class="total-col"><b>${rowTotal}</b></td></tr>`;
  });
  // Total
  html+=`<tr class="bold-row"><td>Жами</td>`;
  let grand=0;
  years.forEach(yr=>{
    let ySum=0;
    types.forEach(pt=>{ if(DATA.prit[String(yr)]&&DATA.prit[String(yr)][pt]) ySum+=sum(DATA.prit[String(yr)][pt]); });
    grand+=ySum;
    html+=`<td>${ySum}</td>`;
  });
  html+=`<td class="total-col">${grand}</td></tr></tbody>`;
  tbl.innerHTML=html;
}

function getTextColor(){ return document.body.classList.contains('light') ? '#5a6a7e' : '#8899aa'; }
function getGridColor(){ return document.body.classList.contains('light') ? 'rgba(0,0,0,.06)' : 'rgba(255,255,255,.06)'; }
function getBorderColor(){ return document.body.classList.contains('light') ? '#ffffff' : '#131b26'; }

function toggleTheme(){
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeLabel').textContent = isLight ? '☀️' : '🌙';
  // Update Chart.js defaults for new theme
  const textColor = isLight ? '#5a6a7e' : '#8899aa';
  const gridColor = isLight ? 'rgba(0,0,0,.06)' : 'rgba(255,255,255,.06)';
  Chart.defaults.color = textColor;
  Chart.defaults.borderColor = gridColor;
  // Re-render active tab to reflect new colors
  if(curTab==='gruz') renderGruz(); else renderPrit();
}

function destroyChart(id){
  if(charts[id]){ charts[id].destroy(); delete charts[id]; }
}
